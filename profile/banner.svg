<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#79C0FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#58A6FF;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#58A6FF;stop-opacity:0" />
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#58A6FF;stop-opacity:0" />
    </radialGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="rounded">
      <rect width="900" height="300" rx="16" />
    </clipPath>
  </defs>

  <rect width="900" height="300" fill="url(#bgGrad)" clip-path="url(#rounded)" />

  <!-- Neural connection lines (animated drawing) -->
  <g stroke="#58A6FF" stroke-opacity="0.15" stroke-width="1.5" fill="none">
    <!-- Connection 1 -->
    <path d="M580,100 Q610,80 640,95" stroke-dasharray="4 6">
      <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="3s" repeatCount="indefinite" />
    </path>
    <!-- Connection 2 -->
    <path d="M620,60 Q660,50 680,70">
      <animate attributeName="stroke-dashoffset" from="0" to="-15" dur="2.5s" repeatCount="indefinite" />
    </path>
    <!-- Connection 3 -->
    <path d="M640,120 Q670,110 700,125" stroke-dasharray="3 5">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="3.5s" repeatCount="indefinite" />
    </path>
    <!-- Connection 4 -->
    <path d="M550,140 Q590,160 630,145" stroke-dasharray="3 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-14" dur="2.8s" repeatCount="indefinite" />
    </path>
    <!-- Connection 5 -->
    <path d="M660,100 Q700,90 720,110">
      <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="3.2s" repeatCount="indefinite" />
    </path>
    <!-- Connection 6 -->
    <path d="M700,80 Q740,65 760,85" stroke-dasharray="2 5">
      <animate attributeName="stroke-dashoffset" from="0" to="-14" dur="2.7s" repeatCount="indefinite" />
    </path>
    <!-- Connection 7 -->
    <path d="M610,140 Q650,170 690,150">
      <animate attributeName="stroke-dashoffset" from="0" to="-18" dur="4s" repeatCount="indefinite" />
    </path>
    <!-- Connection 8 - longer -->
    <path d="M560,110 Q620,70 680,110 Q720,130 750,110" stroke-dasharray="3 7" stroke-opacity="0.1">
      <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="5s" repeatCount="indefinite" />
    </path>
    <!-- Extra connections -->
    <path d="M590,130 Q620,100 650,130">
      <animate attributeName="stroke-dashoffset" from="0" to="-10" dur="2s" repeatCount="indefinite" />
    </path>
    <path d="M680,130 Q710,100 740,130" stroke-dasharray="2 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="3s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Brain SVG - Stylized brain using paths -->
  <g transform="translate(540, 40)" filter="url(#softGlow)">
    <!-- Left hemisphere -->
    <path d="M30,80 
             C10,60 5,35 20,20 
             C35,5 55,10 65,25 
             C70,30 72,35 75,40 
             C85,35 100,35 105,45 
             C110,55 105,65 95,70 
             C90,72 85,72 80,70 
             C78,85 72,100 60,110 
             C45,120 25,115 20,100 
             C15,90 20,85 30,80Z" 
          fill="none" stroke="#58A6FF" stroke-opacity="0.3" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.2;0.4;0.2" dur="4s" repeatCount="indefinite" />
    </path>
    <!-- Right hemisphere -->
    <path d="M105,45 
             C110,35 120,40 125,50 
             C130,60 128,75 120,85 
             C115,90 110,90 105,85 
             C100,95 92,108 80,115 
             C65,125 48,120 40,108 
             C35,100 38,90 48,82 
             C55,75 65,78 70,82 
             C80,78 95,70 105,45Z" 
          fill="none" stroke="#79C0FF" stroke-opacity="0.3" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.2;0.4;0.2" dur="4.5s" repeatCount="indefinite" />
    </path>
    <!-- Brain center detail -->
    <path d="M65,55 
             C70,50 78,50 80,58 
             C82,65 78,72 72,75 
             C65,78 58,72 58,65 
             C58,60 60,55 65,55Z" 
          fill="none" stroke="#58A6FF" stroke-opacity="0.2" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.1;0.3;0.1" dur="3s" repeatCount="indefinite" />
    </path>
    <!-- Brain stem -->
    <path d="M65,110 C65,120 68,130 70,140" 
          fill="none" stroke="#58A6FF" stroke-opacity="0.2" stroke-width="1.5" />
  </g>

  <!-- Neural nodes (pulsing dots) -->
  <g filter="url(#glowFilter)">
    <!-- Node 1 -->
    <circle cx="580" cy="100" r="3" fill="#58A6FF">
      <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
    </circle>
    <!-- Node 2 -->
    <circle cx="640" cy="95" r="2.5" fill="#79C0FF">
      <animate attributeName="r" values="1.5;3.5;1.5" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite" />
    </circle>
    <!-- Node 3 -->
    <circle cx="620" cy="60" r="2" fill="#58A6FF">
      <animate attributeName="r" values="1.5;3;1.5" dur="3s" repeatCount="indefinite" />
    </circle>
    <!-- Node 4 -->
    <circle cx="680" cy="70" r="2.5" fill="#79C0FF">
      <animate attributeName="r" values="2;4;2" dur="2.8s" repeatCount="indefinite" />
    </circle>
    <!-- Node 5 -->
    <circle cx="700" cy="125" r="2" fill="#58A6FF">
      <animate attributeName="r" values="1.5;3;1.5" dur="3.2s" repeatCount="indefinite" />
    </circle>
    <!-- Node 6 -->
    <circle cx="550" cy="140" r="2.5" fill="#79C0FF">
      <animate attributeName="r" values="2;3.5;2" dur="2.2s" repeatCount="indefinite" />
    </circle>
    <!-- Node 7 -->
    <circle cx="630" cy="145" r="2" fill="#58A6FF">
      <animate attributeName="r" values="1.5;3;1.5" dur="3.5s" repeatCount="indefinite" />
    </circle>
    <!-- Node 8 -->
    <circle cx="660" cy="100" r="3" fill="#79C0FF">
      <animate attributeName="r" values="2;4;2" dur="2.7s" repeatCount="indefinite" />
    </circle>
    <!-- Node 9 -->
    <circle cx="720" cy="110" r="2" fill="#58A6FF">
      <animate attributeName="r" values="1.5;3;1.5" dur="2.3s" repeatCount="indefinite" />
    </circle>
    <!-- Node 10 -->
    <circle cx="740" cy="85" r="2.5" fill="#79C0FF">
      <animate attributeName="r" values="1.5;3.5;1.5" dur="3.1s" repeatCount="indefinite" />
    </circle>
    <!-- Node 11 -->
    <circle cx="690" cy="150" r="2" fill="#58A6FF">
      <animate attributeName="r" values="1.5;2.5;1.5" dur="2.9s" repeatCount="indefinite" />
    </circle>
    <!-- Node 12 - on brain -->
    <circle cx="610" cy="85" r="2" fill="#58A6FF">
      <animate attributeName="r" values="1.5;3;1.5" dur="2.1s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Floating particles -->
  <g fill="#58A6FF" fill-opacity="0.15">
    <circle cx="570" cy="70" r="1">
      <animate attributeName="cy" values="60;80;60" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="720" cy="60" r="1">
      <animate attributeName="cy" values="50;70;50" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="750" cy="130" r="1">
      <animate attributeName="cy" values="120;140;120" dur="7s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1;0.2;0.1" dur="7s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Left side: Name and info -->
  <g transform="translate(40, 40)">
    <!-- Accent bar -->
    <rect x="0" y="60" width="4" height="80" rx="2" fill="url(#accentGrad)" />

    <!-- Greeting -->
    <text x="20" y="45" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-weight="400" font-size="14" fill="#8B949E" letter-spacing="2">
      O L Á ,   E U   S O U
    </text>

    <!-- Name -->
    <text x="20" y="95" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-weight="700" font-size="42" fill="#F0F6FC" letter-spacing="1">
      Gabriel
    </text>
    <text x="20" y="135" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-weight="700" font-size="42" fill="#58A6FF" letter-spacing="1">
      Henrique
    </text>

    <!-- Title -->
    <text x="20" y="175" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-weight="500" font-size="16" fill="#8B949E">
      Full-Stack Developer
    </text>
    <text x="20" y="198" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-weight="500" font-size="14" fill="#58A6FF" fill-opacity="0.7">
      <tspan fill="#79C0FF">✦</tspan> AI &amp; MCP Enthusiast
    </text>
  </g>

  <!-- Bottom accent line -->
  <line x1="50" y1="280" x2="850" y2="280" stroke="url(#lineGrad)" stroke-width="1" />

  <!-- Small terminal prompt decoration -->
  <text x="50" y="270" font-family="'Fira Code', 'Courier New', monospace" font-weight="500" font-size="11" fill="#58A6FF" fill-opacity="0.3">
    <tspan fill="#58A6FF" fill-opacity="0.5">$</tspan> ./build.sh <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2s" repeatCount="indefinite" />
  </text>
  <text x="255" y="270" font-family="'Fira Code', 'Courier New', monospace" font-weight="500" font-size="11" fill="#8B949E" fill-opacity="0.2">
    <tspan fill="#58A6FF" fill-opacity="0.4">❯</tspan> Building the future...
  </text>
</svg>
