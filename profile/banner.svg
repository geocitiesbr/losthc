<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <!-- Deep dark background -->
    <radialGradient id="bgGrad" cx="68%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#0A0614;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#060410;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020208;stop-opacity:1" />
    </radialGradient>

    <!-- Brain core glow (purple/violet) -->
    <radialGradient id="brainGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:#CC66FF;stop-opacity:0.5" />
      <stop offset="40%" style="stop-color:#9933FF;stop-opacity:0.25" />
      <stop offset="80%" style="stop-color:#6600CC;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#330066;stop-opacity:0" />
    </radialGradient>

    <!-- Outer ambient glow -->
    <radialGradient id="ambientGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8844FF;stop-opacity:0.18" />
      <stop offset="60%" style="stop-color:#5500BB;stop-opacity:0.06" />
      <stop offset="100%" style="stop-color:#220044;stop-opacity:0" />
    </radialGradient>

    <!-- Brain stroke gradient -->
    <linearGradient id="brainStroke1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DD88FF;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#AA44FF;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#7722EE;stop-opacity:0.5" />
    </linearGradient>
    <linearGradient id="brainStroke2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EE99FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8833CC;stop-opacity:0.4" />
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F6FC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9D1D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#BB66FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7722DD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9933FF;stop-opacity:0" />
      <stop offset="40%" style="stop-color:#AA44FF;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#9933FF;stop-opacity:0" />
    </linearGradient>

    <!-- Filters -->
    <filter id="glowPurple" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glowIntense" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glowSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glowUltra" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="14" result="b1" />
      <feGaussianBlur stdDeviation="5" result="b2" in="SourceGraphic"/>
      <feMerge>
        <feMergeNode in="b1" />
        <feMergeNode in="b2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <clipPath id="rounded">
      <rect width="900" height="300" rx="16" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bgGrad)" clip-path="url(#rounded)" />

  <!-- Ambient purple haze behind brain -->
  <ellipse cx="665" cy="148" rx="180" ry="140" fill="url(#ambientGlow)" clip-path="url(#rounded)" />

  <!-- ============================================ -->
  <!-- NEURAL TENTACLE LINES (emanating from brain) -->
  <!-- ============================================ -->
  <g clip-path="url(#rounded)">

    <!-- Long sweeping lines like the photo - curving outward from brain center -->
    <!-- Each line: starts near brain, curves and fades into dark -->

    <!-- Top-left arc -->
    <path d="M630,115 Q580,70 510,55 Q460,42 400,50"
          fill="none" stroke="#8833CC" stroke-width="1.2" stroke-opacity="0.0">
      <animate attributeName="stroke-opacity" values="0;0.45;0.3;0.45;0" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dasharray" values="0,300;200,100;300,0" dur="5s" repeatCount="indefinite"/>
    </path>

    <!-- Top sweeping right -->
    <path d="M690,108 Q740,72 790,60 Q840,50 890,55"
          fill="none" stroke="#9944DD" stroke-width="1" stroke-opacity="0">
      <animate attributeName="stroke-opacity" values="0;0.4;0.25;0.4;0" dur="4.5s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dasharray" values="0,280;180,100;280,0" dur="4.5s" begin="0.5s" repeatCount="indefinite"/>
    </path>

    <!-- Upper-left curving down -->
    <path d="M625,120 Q570,100 510,120 Q460,138 430,170 Q410,195 420,230"
          fill="none" stroke="#7722BB" stroke-width="1.1" stroke-opacity="0">
      <animate attributeName="stroke-opacity" values="0;0.38;0.22;0.38;0" dur="6s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dasharray" values="0,350;220,130;350,0" dur="6s" begin="1s" repeatCount="indefinite"/>
    </path>

    <!-- Bottom-left arc -->
    <path d="M640,185 Q590,210 540,220 Q490,228 440,215 Q400,205 380,185"
          fill="none" stroke="#8833CC" stroke-width="1" stroke-opacity="0">
      <animate attributeName="stroke-opacity" values="0;0.35;0.2;0.35;0" dur="5.5s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dasharray" values="0,300;200,100;300,0" dur="5.5s" begin="1.5s" repeatCount="indefinite"/>
    </path>

    <!-- Bottom-right sweep -->
    <path d="M700,188 Q750,215 800,220 Q845,223 880,210"
          fill="none" stroke="#9933EE" stroke-width="1.1" stroke-opacity="0">
      <animate attributeName="stroke-opacity" values="0;0.4;0.28;0.4;0" dur="4.8s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dasharray" values="0,260;180,80;260,0" dur="4.8s" begin="0.8s" repeatCount="indefinite"/>
    </path>

    <!-- Far right top -->
    <path d="M705,120 Q760,95 820,88 Q860,84 895,90"
          fill="none" stroke="#AA44FF" stroke-width="0.9" stroke-opacity="0">
      <animate attributeName="stroke-opacity" values="0;0.35;0.2;0.35;0" dur="5.2s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dasharray" values="0,250;160,90;250,0" dur="5.2s" begin="2s" repeatCount="indefinite"/>
    </path>

    <!-- Far right bottom -->
    <path d="M708,168 Q770,190 830,195 Q870,198 900,188"
          fill="none" stroke="#8833CC" stroke-width="0.9" stroke-opacity="0">
      <animate attributeName="stroke-opacity" values="0;0.3;0.18;0.3;0" dur="6.5s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dasharray" values="0,250;160,90;250,0" dur="6.5s" begin="3s" repeatCount="indefinite"/>
    </path>

    <!-- Left side going far left -->
    <path d="M628,148 Q560,148 490,138 Q440,130 400,118"
          fill="none" stroke="#9933EE" stroke-width="1" stroke-opacity="0">
      <animate attributeName="stroke-opacity" values="0;0.32;0.2;0.32;0" dur="5.8s" begin="2.5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dasharray" values="0,280;170,110;280,0" dur="5.8s" begin="2.5s" repeatCount="indefinite"/>
    </path>

    <!-- Diagonal upper-right -->
    <path d="M685,112 Q730,80 775,65 Q810,54 850,58"
          fill="none" stroke="#CC66FF" stroke-width="0.8" stroke-opacity="0">
      <animate attributeName="stroke-opacity" values="0;0.28;0.15;0.28;0" dur="7s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dasharray" values="0,240;150,90;240,0" dur="7s" begin="1.2s" repeatCount="indefinite"/>
    </path>

    <!-- Floating node points on the lines -->
    <circle cx="510" cy="55" r="2.5" fill="#9933FF" filter="url(#glowPurple)" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0.4;0.8;0" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.5;3.5;1.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="230" r="2" fill="#8833CC" filter="url(#glowPurple)" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0.3;0.7;0" dur="6s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1;3;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="220" r="2.5" fill="#BB55FF" filter="url(#glowPurple)" opacity="0">
      <animate attributeName="opacity" values="0;0.75;0.35;0.75;0" dur="4.8s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.5;3.5;1.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="870" cy="130" r="2" fill="#9933EE" filter="url(#glowPurple)" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0.25;0.6;0" dur="5.2s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="118" r="2" fill="#7722BB" filter="url(#glowPurple)" opacity="0">
      <animate attributeName="opacity" values="0;0.65;0.3;0.65;0" dur="5.8s" begin="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="58" r="1.8" fill="#CC66FF" filter="url(#glowPurple)" opacity="0">
      <animate attributeName="opacity" values="0;0.55;0.2;0.55;0" dur="7s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ============================================ -->
  <!-- BRAIN GROUP (center-right, with spin effect) -->
  <!-- ============================================ -->
  <!-- Brain sits at approx cx=665, cy=148 -->

  <!-- Outer ambient halo glow (static) -->
  <ellipse cx="665" cy="148" rx="105" ry="92" fill="url(#brainGlow)" filter="url(#glowUltra)" clip-path="url(#rounded)" />

  <!-- Brain rotating group -->
  <g transform="translate(665,140)">

    <!-- Spin via scaleX 3D illusion -->
    <g>
      <animateTransform attributeName="transform" type="scale"
        values="1,1; 0.15,1; -1,1; -0.15,1; 1,1"
        keyTimes="0; 0.25; 0.5; 0.75; 1"
        dur="9s" repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.45 0 0.55 1; 0.45 0 0.55 1; 0.45 0 0.55 1; 0.45 0 0.55 1" />

      <!-- Intense inner glow core -->
      <ellipse cx="0" cy="-5" rx="55" ry="48" fill="#8822CC" opacity="0.18" filter="url(#glowIntense)" />

      <!-- LEFT HEMISPHERE - main silhouette -->
      <path d="M-10,72
               C-34,56 -44,26 -26,6
               C-12,-10 16,-5 28,12
               C36,22 38,32 40,40
               C54,34 74,34 80,48
               C86,62 78,76 64,82
               C56,86 48,85 42,80
               C40,98 30,116 14,126
               C-4,138 -28,130 -34,112
               C-40,96 -30,82 -10,72Z"
            fill="none" stroke="url(#brainStroke1)" stroke-width="2.2">
        <animate attributeName="stroke-opacity" values="0.65;1;0.65" dur="3s" repeatCount="indefinite"/>
      </path>

      <!-- RIGHT HEMISPHERE -->
      <path d="M80,48
               C88,34 102,40 108,54
               C116,70 110,90 96,100
               C88,106 78,106 72,100
               C64,114 50,128 32,136
               C10,148 -12,138 -20,120
               C-28,104 -18,90 -4,82
               C8,74 24,78 32,86
               C44,82 66,72 80,48Z"
            fill="none" stroke="url(#brainStroke2)" stroke-width="2">
        <animate attributeName="stroke-opacity" values="0.5;0.88;0.5" dur="3.6s" repeatCount="indefinite"/>
      </path>

      <!-- Frontal lobe bump (left) -->
      <path d="M-26,6 C-20,-14 -2,-20 12,-10 C22,-2 26,10 22,22"
            fill="none" stroke="#CC77FF" stroke-width="1.6" stroke-opacity="0.7">
        <animate attributeName="stroke-opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
      </path>

      <!-- Sulcus lines (brain folds) -->
      <path d="M-8,22 C2,12 18,12 24,24 C30,36 20,50 8,54"
            fill="none" stroke="#BB66FF" stroke-width="1.2" stroke-opacity="0.55">
        <animate attributeName="stroke-opacity" values="0.3;0.65;0.3" dur="3.5s" repeatCount="indefinite"/>
      </path>
      <path d="M32,14 C42,6 58,8 62,22 C66,36 56,50 44,54"
            fill="none" stroke="#AA55EE" stroke-width="1.1" stroke-opacity="0.5">
        <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="4.2s" repeatCount="indefinite"/>
      </path>
      <path d="M-14,54 C-4,42 14,44 18,58 C22,70 10,84 -2,86"
            fill="none" stroke="#CC66FF" stroke-width="1.2" stroke-opacity="0.5">
        <animate attributeName="stroke-opacity" values="0.25;0.6;0.25" dur="3.8s" repeatCount="indefinite"/>
      </path>
      <path d="M34,52 C46,40 64,44 66,60 C68,74 54,88 42,90"
            fill="none" stroke="#BB55EE" stroke-width="1.1" stroke-opacity="0.45">
        <animate attributeName="stroke-opacity" values="0.25;0.58;0.25" dur="4.5s" repeatCount="indefinite"/>
      </path>
      <path d="M4,90 C14,78 32,80 36,96 C40,108 26,122 12,122"
            fill="none" stroke="#AA44DD" stroke-width="1" stroke-opacity="0.45">
        <animate attributeName="stroke-opacity" values="0.2;0.55;0.2" dur="5s" repeatCount="indefinite"/>
      </path>
      <!-- Temporal lobe curve -->
      <path d="M-24,80 C-18,68 -6,66 0,78 C6,90 0,104 -10,108"
            fill="none" stroke="#9933CC" stroke-width="1" stroke-opacity="0.4">
        <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="4.8s" repeatCount="indefinite"/>
      </path>
      <!-- Parietal detail -->
      <path d="M70,62 C82,52 96,56 98,70 C100,84 88,96 76,96"
            fill="none" stroke="#BB55FF" stroke-width="1" stroke-opacity="0.4">
        <animate attributeName="stroke-opacity" values="0.2;0.52;0.2" dur="3.2s" repeatCount="indefinite"/>
      </path>

      <!-- Corpus callosum (midline fissure) -->
      <line x1="32" y1="0" x2="32" y2="135"
            stroke="#9933BB" stroke-width="0.8" stroke-opacity="0.25" stroke-dasharray="4 4">
        <animate attributeName="stroke-opacity" values="0.12;0.35;0.12" dur="4s" repeatCount="indefinite"/>
      </line>

      <!-- Bright highlight lines on top of brain (like the photo's light) -->
      <path d="M-8,20 C10,8 32,4 52,12"
            fill="none" stroke="#EEB8FF" stroke-width="1.5" stroke-opacity="0.6">
        <animate attributeName="stroke-opacity" values="0.4;0.85;0.4" dur="2.8s" repeatCount="indefinite"/>
      </path>
      <path d="M52,12 C70,18 84,30 88,46"
            fill="none" stroke="#DDA0FF" stroke-width="1.3" stroke-opacity="0.55">
        <animate attributeName="stroke-opacity" values="0.35;0.75;0.35" dur="3.2s" repeatCount="indefinite"/>
      </path>

      <!-- Brain stem -->
      <path d="M18,130 C18,148 22,160 24,168"
            fill="none" stroke="#8833BB" stroke-width="2" stroke-opacity="0.45">
        <animate attributeName="stroke-opacity" values="0.25;0.55;0.25" dur="4s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Neon glow overlay (doesnt rotate, stays as halo) -->
    <ellipse cx="0" cy="-5" rx="72" ry="62" fill="none" stroke="#9933FF" stroke-width="1" stroke-opacity="0.12" filter="url(#glowIntense)" />
  </g>

  <!-- Floating micro-particles around brain -->
  <g filter="url(#glowSoft)" clip-path="url(#rounded)">
    <circle cx="598" cy="88" r="2" fill="#CC66FF" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0;0.5;0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="598;590;598" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="88;78;88" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="740" cy="82" r="1.8" fill="#BB55FF" opacity="0">
      <animate attributeName="opacity" values="0;0.65;0;0.4;0" dur="5s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="740;748;740" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="82;74;82" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="760" cy="200" r="2" fill="#9933EE" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0;0.4;0" dur="6s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="200;208;200" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="590" cy="208" r="1.5" fill="#AA44FF" opacity="0">
      <animate attributeName="opacity" values="0;0.55;0;0.35;0" dur="4.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="90" r="1.5" fill="#DD88FF" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0;0.3;0" dur="3.8s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="215" r="2" fill="#9922DD" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0;0.4;0" dur="5.5s" begin="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ============================================ -->
  <!-- LEFT SIDE: TEXT                              -->
  <!-- ============================================ -->
  <g transform="translate(44,38)">
    <!-- Vertical accent bar -->
    <rect x="0" y="50" width="3" height="95" rx="1.5" fill="url(#accentGrad)" />

    <!-- Greeting -->
    <text x="18" y="38" font-family="'Segoe UI', -apple-system, sans-serif"
          font-weight="400" font-size="11.5" fill="#9966CC" letter-spacing="3.5">
      O L Á ,   E U   S O U
    </text>

    <!-- Name Gabriel -->
    <text x="18" y="92" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif"
          font-weight="700" font-size="48" fill="#F0F6FC" letter-spacing="0">
      Gabriel
      <animate attributeName="fill" values="#F0F6FC;#EEE8FF;#F0F6FC" dur="5s" repeatCount="indefinite"/>
    </text>

    <!-- Name Henrique -->
    <text x="18" y="140" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif"
          font-weight="700" font-size="48" fill="#AA55FF" letter-spacing="0">
      Henrique
      <animate attributeName="fill" values="#AA55FF;#CC77FF;#AA55FF" dur="4s" repeatCount="indefinite"/>
    </text>

    <!-- Hairline -->
    <line x1="18" y1="155" x2="315" y2="155" stroke="#6622AA" stroke-width="0.5" stroke-opacity="0.4"/>

    <!-- Role -->
    <text x="18" y="176" font-family="'Segoe UI', -apple-system, sans-serif"
          font-weight="500" font-size="15" fill="#9977BB">
      Full-Stack Developer
    </text>

    <!-- Tag -->
    <text x="18" y="198" font-family="'Segoe UI', -apple-system, sans-serif"
          font-weight="400" font-size="13" fill="#8844CC" fill-opacity="0.9">
      ✦ AI &amp; MCP Enthusiast · Brazil
    </text>
  </g>

  <!-- Bottom line -->
  <line x1="44" y1="274" x2="856" y2="274" stroke="url(#lineGrad)" stroke-width="0.8"/>

  <!-- Terminal prompt -->
  <text x="52" y="264" font-family="'Fira Code', monospace" font-size="10" fill="#7722CC" fill-opacity="0.6">$</text>
  <text x="64" y="264" font-family="'Fira Code', monospace" font-size="10" fill="#664488" fill-opacity="0.4">
    thinking.exe
  </text>
  <text x="192" y="264" font-family="'Fira Code', monospace" font-size="10" fill="#9944CC" fill-opacity="0.5">
    <animate attributeName="opacity" values="0;1;0" dur="1.1s" repeatCount="indefinite"/>
    ▋
  </text>
  <text x="820" y="264" font-family="'Fira Code', monospace" font-size="9" fill="#553388" fill-opacity="0.35" text-anchor="middle">
    v2.0 · 2025
  </text>
</svg>
