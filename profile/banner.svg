<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#58A6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#58A6FF;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#79C0FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#79C0FF;stop-opacity:0.05" />
    </linearGradient>
    <clipPath id="rounded">
      <rect width="900" height="300" rx="16" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bgGrad)" clip-path="url(#rounded)" />
  <rect width="900" height="300" fill="url(#glow)" clip-path="url(#rounded)" />

  <!-- Decorative circles -->
  <circle cx="100" cy="50" r="120" fill="#58A6FF" opacity="0.03" />
  <circle cx="800" cy="250" r="150" fill="#79C0FF" opacity="0.03" />
  <circle cx="450" cy="150" r="200" fill="#58A6FF" opacity="0.02" />

  <!-- Grid lines -->
  <line x1="0" y1="75" x2="900" y2="75" stroke="#58A6FF" stroke-opacity="0.05" stroke-width="1" />
  <line x1="0" y1="150" x2="900" y2="150" stroke="#58A6FF" stroke-opacity="0.05" stroke-width="1" />
  <line x1="0" y1="225" x2="900" y2="225" stroke="#58A6FF" stroke-opacity="0.05" stroke-width="1" />

  <!-- Accent line -->
  <rect x="50" y="130" width="4" height="40" rx="2" fill="url(#accentGrad)" />

  <!-- Name -->
  <text x="70" y="155" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-weight="700" font-size="44" fill="#F0F6FC" letter-spacing="1">
    Gabriel Henrique
  </text>

  <!-- Title -->
  <text x="70" y="190" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-weight="500" font-size="18" fill="#8B949E" letter-spacing="0.5">
    <tspan fill="#58A6FF">✦</tspan> Full-Stack Developer &amp; AI Enthusiast
  </text>

  <!-- Bottom line -->
  <line x1="50" y1="260" x2="850" y2="260" stroke="url(#lineGrad)" stroke-width="1.5" />

  <!-- Tags -->
  <rect x="70" y="215" width="80" height="26" rx="6" fill="#58A6FF" fill-opacity="0.1" stroke="#58A6FF" stroke-opacity="0.3" stroke-width="1" />
  <text x="110" y="232" font-family="'Segoe UI', sans-serif" font-weight="600" font-size="11" fill="#58A6FF" text-anchor="middle">TypeScript</text>

  <rect x="158" y="215" width="70" height="26" rx="6" fill="#58A6FF" fill-opacity="0.1" stroke="#58A6FF" stroke-opacity="0.3" stroke-width="1" />
  <text x="193" y="232" font-family="'Segoe UI', sans-serif" font-weight="600" font-size="11" fill="#58A6FF" text-anchor="middle">Python</text>

  <rect x="236" y="215" width="65" height="26" rx="6" fill="#58A6FF" fill-opacity="0.1" stroke="#58A6FF" stroke-opacity="0.3" stroke-width="1" />
  <text x="268" y="232" font-family="'Segoe UI', sans-serif" font-weight="600" font-size="11" fill="#58A6FF" text-anchor="middle">Node.js</text>

  <rect x="309" y="215" width="70" height="26" rx="6" fill="#58A6FF" fill-opacity="0.1" stroke="#58A6FF" stroke-opacity="0.3" stroke-width="1" />
  <text x="344" y="232" font-family="'Segoe UI', sans-serif" font-weight="600" font-size="11" fill="#58A6FF" text-anchor="middle">MCP</text>

  <!-- Code bracket decoration -->
  <text x="830" y="150" font-family="'Fira Code', 'Courier New', monospace" font-weight="600" font-size="60" fill="#58A6FF" fill-opacity="0.08" text-anchor="end">{ }</text>
</svg>
