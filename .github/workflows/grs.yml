name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&theme=dark&bg_color=0D1117&hide_border=true&text_color=c9d1d9&title_color=58A6FF&icon_color=79C0FF
          path: profile/stats.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=10&theme=dark&bg_color=0D1117&hide_border=true&text_color=c9d1d9&title_color=58A6FF
          path: profile/top-langs.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
